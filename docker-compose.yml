version: '3.8'

services:
  db:
    image: postgres:13
    container_name: discount_books_db
    environment:
      POSTGRES_DB: discount_books
      POSTGRES_USER: discount_user
      POSTGRES_PASSWORD: discount_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discount_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
